<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480" role="img" aria-labelledby="title desc">
  <title id="title">cmuxO seal symbol</title>
  <desc id="desc">Circular seal with ORCHESTRATOR JARVIS WATCHER text, O monogram, and 2026.</desc>
  <defs>
    <radialGradient id="paper" cx="50%" cy="45%" r="62%">
      <stop offset="0%" stop-color="#e7d7aa"/>
      <stop offset="70%" stop-color="#d3bd85"/>
      <stop offset="100%" stop-color="#b59a63"/>
    </radialGradient>
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#221b10"/>
      <stop offset="100%" stop-color="#090704"/>
    </linearGradient>
    <path id="topArc" d="M 56 240 A 184 184 0 0 1 424 240"/>
  </defs>

  <!-- Base medallion -->
  <circle cx="240" cy="240" r="200" fill="url(#paper)" stroke="#1b140c" stroke-width="5"/>
  <circle cx="240" cy="240" r="174" fill="none" stroke="#2b2215" stroke-width="3"/>
  <circle cx="240" cy="240" r="132" fill="none" stroke="#2b2215" stroke-width="2.6"/>

  <!-- Center monogram -->
  <text x="240" y="284" text-anchor="middle" fill="#1a130a" font-family="Times New Roman, Georgia, serif" font-size="138" font-weight="700">O</text>

  <!-- Ring text -->
  <text fill="#1a130a" font-family="Times New Roman, Georgia, serif" font-size="16" font-weight="700" letter-spacing="0.8">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">ORCHESTRATOR JARVIS WATCHER</textPath>
  </text>
</svg>
